name: Linux ARM64 AppImage Build

on:
  # Manual trigger from GitHub UI or API
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload to GitHub Release'
        required: true
        default: 'false'
        type: boolean

  # Trigger on version tags (pre-release and release)
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for version tags

      - name: Bump version code
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        id: bump
        run: |
          CURRENT=$(cat versioncode.txt | tr -d '[:space:]')
          NEXT=$((CURRENT + 1))
          echo "$NEXT" > versioncode.txt
          echo "build_code=$NEXT" >> $GITHUB_OUTPUT
          echo "Version code bumped: $CURRENT -> $NEXT"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libpulse0 \
            libspeechd2 \
            fuse \
            libfuse2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          target: 'desktop'
          arch: 'linux_gcc_arm64'
          modules: 'qtshadertools qtcharts qtconnectivity qtmultimedia qtpositioning qtspeech qtwebsockets qtserialport'
          cache: true
          cache-key-prefix: 'qt-linux-arm64-v1'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.21
        with:
          key: linux-arm64

      - name: Configure ccache for CI
        run: ccache --set-config=compiler_check=content

      - name: Download linuxdeploy tools
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-aarch64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-aarch64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          $QT_ROOT_DIR/bin/qt-cmake .. -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DENABLE_QUICK3D=OFF \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: |
          cd build
          ninja -j$(nproc)

      - name: Get version
        id: version
        run: |
          VERSION=$(grep "project(Decenza VERSION" CMakeLists.txt | sed 's/.*VERSION \([0-9.]*\).*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp build/bin/Decenza AppDir/usr/bin/
          cp decenza.desktop AppDir/usr/share/applications/
          cp decenza.png AppDir/usr/share/icons/hicolor/256x256/apps/

      - name: Install GStreamer
        run: |
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev

      - name: Remove problematic Qt plugins
        run: |
          # Remove plugins with external dependencies not available in AppImage
          rm -f $QT_ROOT_DIR/plugins/imageformats/libqtiff.so
          rm -f $QT_ROOT_DIR/plugins/sqldrivers/libqsqlibase.so
          rm -f $QT_ROOT_DIR/plugins/sqldrivers/libqsqlpsql.so
          rm -f $QT_ROOT_DIR/plugins/sqldrivers/libqsqlmysql.so
          rm -f $QT_ROOT_DIR/plugins/sqldrivers/libqsqloci.so
          rm -f $QT_ROOT_DIR/plugins/sqldrivers/libqsqlodbc.so
          rm -f $QT_ROOT_DIR/plugins/sqldrivers/libqsqlmimer.so
          rm -f $QT_ROOT_DIR/plugins/position/libqtposition_nmea.so
          # Flite TTS plugin has missing libflite.so.1 dependency (we use speechd)
          rm -f $QT_ROOT_DIR/plugins/texttospeech/libqtexttospeech_flite.so
          # Remove Quick3D QML modules (not built on ARM64, but Qt install includes them)
          rm -rf $QT_ROOT_DIR/qml/QtQuick3D

      - name: Create AppImage
        env:
          QMAKE: ${{ env.QT_ROOT_DIR }}/bin/qmake
          QML_SOURCES_PATHS: ${{ github.workspace }}/qml
        run: |
          ./linuxdeploy-aarch64.AppImage \
            --appdir AppDir \
            --plugin qt \
            --output appimage

      - name: Rename AppImage
        run: |
          mv Decenza-aarch64.AppImage Decenza_${{ steps.version.outputs.version }}-aarch64.AppImage

      - name: Upload AppImage as artifact
        uses: actions/upload-artifact@v7
        with:
          name: Decenza-Linux-aarch64
          path: Decenza_${{ steps.version.outputs.version }}-aarch64.AppImage
          retention-days: 1
          overwrite: true

      - name: Upload to GitHub Release
        if: ${{ inputs.upload_to_release == true || startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the tag name (either from push or extract version)
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME="${{ github.ref_name }}"
          else
            TAG_NAME="v${{ steps.version.outputs.version }}"
          fi

          echo "Uploading to release: $TAG_NAME"

          # Check if release exists, create if not
          if ! gh release view "$TAG_NAME" > /dev/null 2>&1; then
            echo "Creating release $TAG_NAME"
            gh release create "$TAG_NAME" \
              --title "Decenza $TAG_NAME" \
              --generate-notes
          fi

          # Upload the AppImage
          gh release upload "$TAG_NAME" \
            "Decenza_${{ steps.version.outputs.version }}-aarch64.AppImage" \
            --clobber

      - name: Warm main branch cache for next release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          IS_PRERELEASE=$(gh release view "$TAG" --json isPrerelease --jq '.isPrerelease')
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Skipping cache warm for pre-release $TAG"
          else
            gh workflow run "$GITHUB_WORKFLOW" --ref main || echo "Cache warm dispatch failed (non-fatal)"
          fi

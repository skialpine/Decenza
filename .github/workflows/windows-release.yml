name: Windows Build

on:
  # Manual trigger from GitHub UI or API
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload to latest GitHub release'
        required: true
        default: 'false'
        type: boolean

  # Trigger on version tags (pre-release and release)
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for version tags

      - name: Bump version code
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        id: bump
        shell: bash
        run: |
          CURRENT=$(cat versioncode.txt | tr -d '[:space:]')
          NEXT=$((CURRENT + 1))
          echo "$NEXT" > versioncode.txt
          echo "build_code=$NEXT" >> $GITHUB_OUTPUT
          echo "Version code bumped: $CURRENT -> $NEXT"

      - name: Get version info
        id: version
        shell: bash
        run: |
          VERSION=$(grep 'project.*VERSION' CMakeLists.txt | sed 's/.*VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtquick3d qtshadertools qtcharts qtconnectivity qtmultimedia qtpositioning qtspeech qtwebsockets qtserialport qtimageformats'
          tools: 'tools_ninja'
          cache: true
          cache-key-prefix: 'qt-windows-v2'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Find Qt bundled Ninja and add to PATH
        shell: powershell
        run: |
          $ninja = Get-ChildItem "$env:QT_ROOT_DIR\..\..\Tools" -Recurse -Filter "ninja.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ninja) { Write-Error "Ninja not found in Qt Tools directory"; exit 1 }
          Write-Host "Found Ninja at: $($ninja.FullName)"
          Add-Content $env:GITHUB_PATH $ninja.DirectoryName

      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          variant: sccache
          key: sccache-windows-x64-qt6.10.3
          max-size: 500M

      - name: Install OpenSSL
        id: openssl
        shell: powershell
        run: |
          # Qt 6.10.3 for Windows is built against the OpenSSL 3 ABI. If Chocolatey's
          # default openssl package bumps to 4.x, Qt's network stack will break at
          # runtime even though a 4.x install would otherwise succeed. Pin to a
          # known-good 3.x release and verify the 3-series DLLs are present.
          choco install openssl --version=3.5.4 -y --no-progress

          # Check the canonical Chocolatey install locations only. No recursive
          # search — GitHub runners ship Git-for-Windows (with its own bundled
          # libssl-3) and a stray DLL would silently pass this step while the
          # installer actually copied a mismatched build.
          $candidates = @(
            "C:\Program Files\OpenSSL-Win64\bin",
            "C:\Program Files\OpenSSL\bin",
            "C:\OpenSSL-Win64\bin"
          )

          $opensslBin = $null
          foreach ($dir in $candidates) {
            if ((Test-Path "$dir\libssl-3-x64.dll") -and (Test-Path "$dir\libcrypto-3-x64.dll")) {
              $opensslBin = $dir
              break
            }
          }

          if (-not $opensslBin) {
            Write-Error "OpenSSL 3 DLLs not found in any canonical Chocolatey install path. Did the package layout change, or did version 3.5.4 become unavailable on the community feed?"
            exit 1
          }

          Write-Host "OpenSSL 3 found at: $opensslBin"
          echo "dir=$opensslBin" >> $env:GITHUB_OUTPUT

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build Release
        run: |
          cd build
          cmake --build . --parallel

      - name: Download VC++ Redistributable
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path vcredist
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "vcredist\vc_redist.x64.exe"

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y

      - name: Create Inno Setup config
        shell: powershell
        run: |
          $VERSION = "${{ steps.version.outputs.version }}"
          $BUILD_NUM = (Get-Content "versioncode.txt").Trim()
          $WORKSPACE = $env:GITHUB_WORKSPACE
          $QT_DIR = $env:QT_ROOT_DIR

          # Create version.iss
          @"
          #define BuildNumber "$BUILD_NUM"
          #define VersionNumber "$VERSION"
          #define TargetName "Decenza"
          #define TargetArch "x64"
          #define TargetProduct "Decenza"
          #define TargetCompany "Decenza"
          "@ | Out-File -FilePath "installer\version.iss" -Encoding ASCII

          # Create setupvars.iss for CI
          @"
          ; CI-generated paths
          #define SourceDir "$WORKSPACE"
          #define AppBuildDir "$WORKSPACE\build"
          #define AppDeployDir "$WORKSPACE\installer\deploy"
          #define QtDir "$QT_DIR"
          #define VcRedistDir "$WORKSPACE\vcredist"
          #define VcRedistFile "vc_redist.x64.exe"
          #define OpenSslDir "${{ steps.openssl.outputs.dir }}"
          "@ | Out-File -FilePath "installer\setupvars.iss" -Encoding ASCII

          Write-Host "=== version.iss ==="
          Get-Content installer\version.iss
          Write-Host "=== setupvars.iss ==="
          Get-Content installer\setupvars.iss

      - name: Build Installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /O"installer\Output" installer\setup.iss

      - name: List output
        shell: bash
        run: |
          echo "=== Installer output ==="
          ls -la installer/Output/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Decenza-Windows-Installer
          path: installer/Output/*.exe
          retention-days: 1
          overwrite: true

      - name: Upload to GitHub Release
        if: ${{ inputs.upload_to_release == true || startsWith(github.ref, 'refs/tags/v') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          INSTALLER="installer/Output/Decenza_v${VERSION}_winx64_installer.exe"

          # Find the release (by tag or latest)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${VERSION}"
          fi

          echo "Uploading to release: $TAG"
          gh release upload "$TAG" "$INSTALLER" --clobber || echo "Release $TAG not found, skipping upload"

      - name: Warm main branch cache for next release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          IS_PRERELEASE=$(gh release view "$TAG" --json isPrerelease --jq '.isPrerelease')
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Skipping cache warm for pre-release $TAG"
          else
            gh workflow run "$GITHUB_WORKFLOW" --ref main || echo "Cache warm dispatch failed (non-fatal)"
          fi

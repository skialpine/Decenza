name: macOS Build

on:
  # Manual trigger from GitHub UI or API
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: 'Upload to latest GitHub release'
        required: true
        default: 'false'
        type: boolean

  # Or trigger on version tags
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for version tags

      - name: Bump version code
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        id: bump
        run: |
          CURRENT=$(cat versioncode.txt | tr -d '[:space:]')
          NEXT=$((CURRENT + 1))
          echo "$NEXT" > versioncode.txt
          echo "build_code=$NEXT" >> $GITHUB_OUTPUT
          echo "Version code bumped: $CURRENT -> $NEXT"

      - name: Get version info
        id: version
        run: |
          VERSION=$(grep 'project.*VERSION' CMakeLists.txt | sed 's/.*VERSION \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.2'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtquick3d qtshadertools qtcharts qtconnectivity qtmultimedia qtpositioning qtspeech qtwebsockets qtwebengine qtserialport'
          cache: true
          cache-key-prefix: 'qt-macos-v2'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: macos-universal
          max-size: 500M

      - name: Install Apple Developer ID certificate
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/developer_id_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode from base64
          echo -n "$P12_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Verify certificate
          echo "Installed certificates:"
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      - name: Build universal OpenSSL
        run: |
          OPENSSL_VERSION="3.5.0"
          OPENSSL_URL="https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz"
          INSTALL_PREFIX="${RUNNER_TEMP}/openssl-universal"

          cd $RUNNER_TEMP
          curl -L "$OPENSSL_URL" | tar xz
          cd "openssl-${OPENSSL_VERSION}"

          # Build arm64
          ./Configure darwin64-arm64-cc no-shared no-tests \
            --prefix="${INSTALL_PREFIX}/arm64" \
            -mmacosx-version-min=12.0
          make -j$(sysctl -n hw.ncpu)
          make install_sw
          make clean

          # Build x86_64
          ./Configure darwin64-x86_64-cc no-shared no-tests \
            --prefix="${INSTALL_PREFIX}/x86_64" \
            -mmacosx-version-min=12.0
          make -j$(sysctl -n hw.ncpu)
          make install_sw

          # Create universal libs
          mkdir -p "${INSTALL_PREFIX}/lib"
          cp -R "${INSTALL_PREFIX}/arm64/include" "${INSTALL_PREFIX}/"
          for lib in libssl.a libcrypto.a; do
            lipo -create \
              "${INSTALL_PREFIX}/arm64/lib/${lib}" \
              "${INSTALL_PREFIX}/x86_64/lib/${lib}" \
              -output "${INSTALL_PREFIX}/lib/${lib}"
          done
          echo "Universal OpenSSL installed at ${INSTALL_PREFIX}"

      - name: Configure CMake
        run: |
          OPENSSL_PREFIX="${RUNNER_TEMP}/openssl-universal"
          mkdir -p build/macos
          cd build/macos
          $QT_ROOT_DIR/bin/qt-cmake ../.. -G Xcode \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64" \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DOPENSSL_ROOT_DIR="${OPENSSL_PREFIX}" \
            -DOPENSSL_INCLUDE_DIR="${OPENSSL_PREFIX}/include" \
            -DOPENSSL_CRYPTO_LIBRARY="${OPENSSL_PREFIX}/lib/libcrypto.a" \
            -DOPENSSL_SSL_LIBRARY="${OPENSSL_PREFIX}/lib/libssl.a"

      - name: Build Release
        run: |
          cd build/macos
          # Inject ccache via Xcode CC/CXX build settings
          cmake --build . --config Release --parallel -- CC="ccache clang" CXX="ccache clang++"

      - name: Bundle Qt frameworks
        run: |
          APP_PATH="build/macos/Release/Decenza.app"
          echo "Running macdeployqt on: $APP_PATH"

          # macdeployqt bundles Qt frameworks and fixes library paths
          $QT_ROOT_DIR/bin/macdeployqt "$APP_PATH" -qmldir=qml -verbose=2

          echo "Bundled frameworks:"
          ls -la "$APP_PATH/Contents/Frameworks/" | head -20

      - name: Sign the application
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          APP_PATH="build/macos/Release/Decenza.app"

          # Unlock keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Sign all nested components first, then the app itself
          # --options runtime enables hardened runtime (required for notarization)
          # --deep signs nested code
          # --force replaces any existing signatures
          codesign --deep --force --options runtime \
            --sign "Developer ID Application: Michael Holm (HKHN2RK2P4)" \
            "$APP_PATH"

          # Verify signature
          echo "Verifying signature..."
          codesign -dvv "$APP_PATH"
          codesign --verify --strict "$APP_PATH"
          echo "Signature verified successfully"

      - name: Create DMG
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DMG_NAME="Decenza_v${VERSION}_macos.dmg"

          # Find the built app (named Decenza.app)
          APP_PATH="build/macos/Release/Decenza.app"
          echo "Looking for app at: $APP_PATH"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Could not find $APP_PATH"
            find build/macos -name "*.app" -type d
            exit 1
          fi

          # Create a temporary directory for DMG contents
          mkdir -p dmg_contents
          cp -R "$APP_PATH" "dmg_contents/Decenza.app"

          # Create Applications symlink
          ln -s /Applications dmg_contents/Applications

          # Create DMG
          hdiutil create -volname "Decenza" \
            -srcfolder dmg_contents \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "Created: $DMG_NAME"
          ls -la "$DMG_NAME"

      - name: Sign the DMG
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DMG_NAME="Decenza_v${VERSION}_macos.dmg"

          # Unlock keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Sign the DMG
          codesign --force --sign "Developer ID Application: Michael Holm (HKHN2RK2P4)" "$DMG_NAME"

          echo "DMG signed successfully"

      - name: Notarize the DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_APP_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DMG_NAME="Decenza_v${VERSION}_macos.dmg"

          echo "Submitting for notarization..."
          xcrun notarytool submit "$DMG_NAME" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_APP_PASSWORD" \
            --wait

          echo "Stapling notarization ticket to DMG..."
          xcrun stapler staple "$DMG_NAME"

          echo "Notarization complete!"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Decenza-macOS
          path: Decenza_v*.dmg
          retention-days: 1
          overwrite: true

      - name: Upload to GitHub Release
        if: ${{ inputs.upload_to_release == true || startsWith(github.ref, 'refs/tags/v') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DMG_NAME="Decenza_v${VERSION}_macos.dmg"

          # Find the release (by tag or latest)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${VERSION}"
          fi

          echo "Uploading to release: $TAG"
          gh release upload "$TAG" "$DMG_NAME" --clobber || echo "Release $TAG not found, skipping upload"

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

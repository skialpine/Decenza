name: iOS App Store Build

on:
  # Manual trigger from GitHub UI or API
  workflow_dispatch:
    inputs:
      upload_to_appstore:
        description: 'Upload to App Store Connect'
        required: true
        default: 'false'
        type: boolean

  # Trigger on version tags (pre-release and release)
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-26

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for version tags

      - name: Bump version code
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        id: bump
        run: |
          CURRENT=$(cat versioncode.txt | tr -d '[:space:]')
          NEXT=$((CURRENT + 1))
          echo "$NEXT" > versioncode.txt
          echo "build_code=$NEXT" >> $GITHUB_OUTPUT
          echo "Version code bumped: $CURRENT -> $NEXT"

      - name: Pin Xcode to 26.0.1
        run: |
          # macos-26 default is Xcode 26.2, whose clang adds a strict check
          # that refuses to compile when more than one *_DEPLOYMENT_TARGET
          # env var is set. The runner image exports MACOSX, IPHONESIMULATOR,
          # and MACCATALYST values (all from the macOS 26 host); the iOS
          # cross-compile adds IPHONEOS=17.0 — four platform vars in one env,
          # which trips the check inside Xcode's PhaseScriptExecution
          # subprocesses where we can't easily scrub them.
          #
          # Xcode 26.0.1 ships an earlier clang from the same Xcode 26 family,
          # so it satisfies App Store Connect's iOS 26 SDK requirement, but
          # without the new env-conflict check. Pinning here keeps the SDK
          # gate satisfied while sidestepping the build failure on macos-26.
          # Tracked separately as a Qt-toolchain follow-up.
          sudo xcode-select -s /Applications/Xcode_26.0.1.app/Contents/Developer
          xcodebuild -version
          echo "DEVELOPER_DIR=/Applications/Xcode_26.0.1.app/Contents/Developer" >> $GITHUB_ENV

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.10.3'
          target: 'ios'
          arch: 'ios'
          modules: 'qtquick3d qtshadertools qtcharts qtconnectivity qtmultimedia qtpositioning qtspeech qtwebsockets qtimageformats'
          cache: true
          cache-key-prefix: 'qt-ios-v4'

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: ios-arm64
          max-size: 500M

      - name: Configure ccache for CI
        run: ccache --set-config=compiler_check=content

      - name: Create ccache compiler wrappers
        run: |
          # Use CMAKE_XCODE_ATTRIBUTE_CC/CXX approach (same as macOS).
          # CMake configure uses the real compiler; only xcodebuild uses wrappers.
          WRAPPER_DIR="$RUNNER_TEMP/ccache-wrappers"
          mkdir -p "$WRAPPER_DIR"
          CLANG=$(xcrun -f clang)
          CLANGPP=$(xcrun -f clang++)
          printf '#!/bin/sh\nif [ "$1" = "%s" ]; then shift; fi\nexec ccache "%s" "$@"\n' "$CLANG" "$CLANG" > "$WRAPPER_DIR/launch-c"
          printf '#!/bin/sh\nif [ "$1" = "%s" ]; then shift; fi\nexec ccache "%s" "$@"\n' "$CLANGPP" "$CLANGPP" > "$WRAPPER_DIR/launch-cxx"
          chmod +x "$WRAPPER_DIR/launch-c" "$WRAPPER_DIR/launch-cxx"
          echo "CCACHE_LAUNCH_C=$WRAPPER_DIR/launch-c" >> $GITHUB_ENV
          echo "CCACHE_LAUNCH_CXX=$WRAPPER_DIR/launch-cxx" >> $GITHUB_ENV

      - name: Install Apple certificate and provisioning profile
        env:
          P12_CERTIFICATE_BASE64: ${{ secrets.P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode from base64
          echo -n "$P12_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile (must use UUID as filename)
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(/usr/bin/security cms -D -i $PROFILE_PATH))
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "Installed profile with UUID: $PROFILE_UUID"
          echo "PROFILE_UUID=$PROFILE_UUID" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          # The macos-26 runner image sets MACOSX_DEPLOYMENT_TARGET=26.2 in
          # the shell env. Xcode 26's clang refuses to compile when conflicting
          # *_DEPLOYMENT_TARGET env vars are present (the iOS toolchain sets
          # IPHONEOS_DEPLOYMENT_TARGET=17.0 for the iOS target, and the host's
          # 26.2 leaks in alongside it). Unset before invoking qt-cmake so the
          # compiler-ABI introspection it runs doesn't trip the new check.
          unset MACOSX_DEPLOYMENT_TARGET
          mkdir -p build/ios
          cd build/ios
          $QT_ROOT_DIR/bin/qt-cmake ../.. -G Xcode \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=14.0 \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DCMAKE_XCODE_ATTRIBUTE_CC="$CCACHE_LAUNCH_C" \
            -DCMAKE_XCODE_ATTRIBUTE_CXX="$CCACHE_LAUNCH_CXX" \
            -DCMAKE_XCODE_ATTRIBUTE_LD="$CCACHE_LAUNCH_C" \
            -DCMAKE_XCODE_ATTRIBUTE_LDPLUSPLUS="$CCACHE_LAUNCH_CXX"

      - name: Build and Archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # See the Configure CMake step for why this is needed. xcodebuild
          # forks autogen scripts that re-invoke clang for CMake's ABI test;
          # the host MACOSX_DEPLOYMENT_TARGET must be cleared so the iOS
          # cross-compile target doesn't conflict.
          unset MACOSX_DEPLOYMENT_TARGET
          cd build/ios

          # Build archive
          xcodebuild archive \
            -project Decenza.xcodeproj \
            -scheme Decenza \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/Decenza.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=$TEAM_ID \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.PROVISIONING_PROFILE_NAME }}"

      - name: Export IPA
        env:
          KEYCHAIN_PATH: ${{ runner.temp }}/app-signing.keychain-db
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Unlock keychain for export
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH

          # Create export options plist using profile UUID from env
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>${{ secrets.APPLE_TEAM_ID }}</string>
              <key>uploadSymbols</key>
              <true/>
              <key>destination</key>
              <string>export</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>signingCertificate</key>
              <string>iPhone Distribution</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>io.github.kulitorum.decenza</key>
                  <string>Decenza App Store</string>
              </dict>
          </dict>
          </plist>
          PLIST

          echo "Export options:"
          cat $RUNNER_TEMP/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Decenza.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect
        if: ${{ inputs.upload_to_appstore || startsWith(github.ref, 'refs/tags/v') }}
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # Decode API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          # Upload using altool
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/Decenza.ipa" \
            --type ios \
            --apiKey $APP_STORE_CONNECT_API_KEY_ID \
            --apiIssuer $APP_STORE_CONNECT_API_ISSUER_ID

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v7
        with:
          name: Decenza-iOS
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 1
          overwrite: true

      - name: Find dSYMs
        run: |
          echo "# Checking xcarchive dSYMs directory:"
          ls -la $RUNNER_TEMP/Decenza.xcarchive/dSYMs/ 2>/dev/null || echo "(empty or missing)"
          echo ""
          echo "# Checking build output:"
          ls -la build/ios/Release-iphoneos/*.dSYM 2>/dev/null || echo "(not in build output)"
          echo ""
          echo "# Searching workspace for all .dSYM bundles:"
          find $GITHUB_WORKSPACE -name "*.dSYM" -type d 2>/dev/null || echo "(none found in workspace)"
          find $RUNNER_TEMP -name "*.dSYM" -type d 2>/dev/null || echo "(none found in runner temp)"

      - name: Upload dSYMs for crash symbolication
        uses: actions/upload-artifact@v7
        with:
          name: Decenza-iOS-dSYMs
          path: |
            ${{ runner.temp }}/Decenza.xcarchive/dSYMs/
            build/ios/Release-iphoneos/*.dSYM
          retention-days: 90
          overwrite: true
          if-no-files-found: warn

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

      - name: Warm main branch cache for next release
        if: success() && startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          IS_PRERELEASE=$(gh release view "$TAG" --json isPrerelease --jq '.isPrerelease')
          if [ "$IS_PRERELEASE" = "true" ]; then
            echo "Skipping cache warm for pre-release $TAG"
          else
            gh workflow run "$GITHUB_WORKFLOW" --ref main || echo "Cache warm dispatch failed (non-fatal)"
          fi
